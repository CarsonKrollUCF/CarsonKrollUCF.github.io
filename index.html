<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Select</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--player 1 stuff-->
    <div class="screen">

        <aside class="player player1">
            <h2>GUY 1</h2>

            <div class="portrait">
                <img src="images/placeholder.png" alt="guy 1">
            </div>

            <<div class="archetype">
    Zoner
    <span class="tooltip">
        those who zone
    </span>
</div>
        </aside>

        <!--roster-->
        <main class="center">

            <div class="title">
                SELECT YOUR CHARACTER
            </div>

            <div class="roster">

                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>

                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>

                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>

                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>
                <button><img src="images/placeholder.png" alt=""></button>

            </div>

            <!--big ol lock in button-->
            <a class="lock-in" href="https://www.youtube.com/watch?v=0HEE78L_CnA">
                LOCK IN
            </a>

        </main>

        <!--player 2 stuff-->
        <aside class="player player2">
            <h2>GUY 2</h2>

            <div class="portrait">
                <img src="images/placeholder.png" alt="guy 2">
            </div>

            <div class="archetype">
                Grappler
                <span class="tooltip">
                    those who command grab
                </span>
            </div>
        </aside>

    </div>

</body>
</html>
